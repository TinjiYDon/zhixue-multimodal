# 本地开发依赖：PostgreSQL / Redis / MinIO
# 用法：在本目录执行 docker compose up -d
# 默认 PG 5435，与 ICU 项目及本机 PG16(5432) 错开

services:
  postgres:
    image: postgres:16-alpine
    container_name: zhixue_postgres
    environment:
      POSTGRES_USER: zhixue
      POSTGRES_PASSWORD: zhixue_dev
      POSTGRES_DB: zhixue
    ports:
      - "${ZHIXUE_PG_PORT:-5435}:5432"
    volumes:
      - zhixue_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zhixue_redis
    ports:
      - "${ZHIXUE_REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    container_name: zhixue_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - zhixue_minio_data:/data

volumes:
  zhixue_pg_data:
  zhixue_minio_data:
